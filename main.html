<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tier Studio</title>

<style>
:root {
    --bg:#0f172a;
    --panel:#1e293b;
    --text:#e5e7eb;
    --accent:#6366f1;
}

.light {
    --bg:#f8fafc;
    --panel:#e2e8f0;
    --text:#0f172a;
}

body {
    margin:0;
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1 {
    text-align:center;
}

/* TIER */
.tier {
    display:grid;
    grid-template-columns:90px 1fr;
    margin-bottom:12px;
    border-radius:12px;
    overflow:hidden;
    transition:0.2s;
}

.tier:hover {
    transform:scale(1.01);
}

.label {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    font-weight:bold;
}

.label input {
    width:70px;
    text-align:center;
    background:transparent;
    border:none;
    color:white;
    font-weight:bold;
}

.label input[type=color] {
    height:25px;
    border:none;
}

/* ITEMS */
.items, .pool {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:10px;
    background:var(--panel);
    min-height:90px;
}

.item {
    width:75px;
    height:75px;
    border-radius:10px;
    overflow:hidden;
    position:relative;
    cursor:grab;
    transition:0.2s;
}

.item:hover {
    transform:scale(1.1);
}

.item:active {
    transform:scale(0.95);
}

.item img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* DELETE BUTTON */
.delete {
    position:absolute;
    top:3px;
    right:3px;
    background:red;
    color:white;
    border:none;
    border-radius:50%;
    width:18px;
    height:18px;
    font-size:12px;
    cursor:pointer;
    opacity:0;
    transition:0.2s;
}

.item:hover .delete {
    opacity:1;
}

/* POOL */
.pool {
    border:2px dashed #555;
    margin-top:20px;
}

/* CONTROLS */
.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

button {
    background:var(--accent);
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    transform:translateY(-2px);
}

/* TIER DELETE */
.remove-tier {
    background:#ef4444;
    margin-top:5px;
}
</style>
</head>

<body>

<h1>🔥 Tier Studio</h1>

<div class="container" id="tiers"></div>

<h2 style="text-align:center;">Unranked</h2>
<div class="container">
    <div id="pool" class="pool"></div>
</div>

<div class="controls">
    <input type="file" id="upload">
    <button onclick="addTier()">+ Tier</button>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="exportImg()">Export</button>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let dragged=null;

// CREATE ITEM
function createItem(src) {
    const div=document.createElement("div");
    div.className="item";
    div.draggable=true;

    const img=document.createElement("img");
    img.src=src;

    const del=document.createElement("button");
    del.textContent="×";
    del.className="delete";
    del.onclick=(e)=>{
        e.stopPropagation();
        div.remove();
        save();
    };

    div.appendChild(img);
    div.appendChild(del);

    div.ondragstart=()=>dragged=div;
    div.ondragend=save;

    return div;
}

// DROP ZONE
function makeDrop(el) {
    el.ondragover=e=>{
        e.preventDefault();
        el.appendChild(dragged);
    };
    el.ondrop=save;
}

// CREATE TIER
function createTier(name="NEW", color="#ff0000") {
    const tier=document.createElement("div");
    tier.className="tier";

    const label=document.createElement("div");
    label.className="label";
    label.style.background=color;

    const input=document.createElement("input");
    input.value=name;

    const colorInput=document.createElement("input");
    colorInput.type="color";
    colorInput.value=color;

    colorInput.oninput=()=>{
        label.style.background=colorInput.value;
        save();
    };

    input.onchange=save;

    const remove=document.createElement("button");
    remove.textContent="🗑";
    remove.className="remove-tier";
    remove.onclick=()=>{
        tier.remove();
        save();
    };

    label.append(input,colorInput,remove);

    const items=document.createElement("div");
    items.className="items";

    makeDrop(items);

    tier.append(label,items);
    document.getElementById("tiers").appendChild(tier);
}

// UPLOAD
upload.onchange=e=>{
    const f=e.target.files[0];
    if(!f) return;

    const r=new FileReader();
    r.onload=()=>{
        pool.appendChild(createItem(r.result));
        save();
    };
    r.readAsDataURL(f);
};

// SAVE
function save() {
    const data={
        tiers:[],
        pool:[...document.querySelectorAll("#pool img")].map(i=>i.src)
    };

    document.querySelectorAll(".tier").forEach(t=>{
        data.tiers.push({
            name:t.querySelector("input").value,
            color:t.querySelector("input[type=color]").value,
            items:[...t.querySelectorAll("img")].map(i=>i.src)
        });
    });

    localStorage.setItem("tierstudio", JSON.stringify(data));
}

// LOAD
function load() {
    const data=JSON.parse(localStorage.getItem("tierstudio"));
    if(!data){
        ["S","A","B","C","D"].forEach(n=>createTier(n));
        return;
    }

    data.tiers.forEach(t=>{
        createTier(t.name,t.color);
        const tierEl=document.querySelectorAll(".tier");
        const last=tierEl[tierEl.length-1].querySelector(".items");

        t.items.forEach(src=>last.appendChild(createItem(src)));
    });

    data.pool.forEach(src=>pool.appendChild(createItem(src)));
}

// THEME
function toggleTheme(){
    document.body.classList.toggle("light");
}

// EXPORT
function exportImg(){
    html2canvas(document.body).then(c=>{
        const a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="tier.png";
        a.click();
    });
}

// INIT
const pool=document.getElementById("pool");
makeDrop(pool);

function addTier(){ createTier(); save(); }

load();
</script>

</body>
</html>
