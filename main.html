<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TierMaker Pro+</title>

<style>
:root {
    --bg:#0f172a;
    --text:white;
    --panel:rgba(255,255,255,0.05);
}
.light {
    --bg:#f1f5f9;
    --text:#111;
    --panel:#e2e8f0;
}

body {
    margin:0;
    font-family:system-ui;
    background:var(--bg);
    color:var(--text);
}

h1 { text-align:center; }

.container {
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.tier {
    display:flex;
    margin-bottom:10px;
}

.label input {
    width:70px;
    text-align:center;
    font-weight:bold;
    border:none;
    background:transparent;
    color:var(--text);
}

.items, .pool {
    flex:1;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:10px;
    background:var(--panel);
    min-height:80px;
}

.pool {
    margin-top:20px;
    border:2px dashed #666;
}

.item {
    width:70px;
    height:70px;
    border-radius:8px;
    overflow:hidden;
    cursor:grab;
}

.item img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.controls {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

button {
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🔥 TierMaker Pro+</h1>

<div class="container" id="tiers"></div>

<h2 style="text-align:center;">Unranked</h2>
<div class="container">
    <div class="pool" id="pool"></div>
</div>

<div class="controls">
    <input type="file" id="upload">
    <button onclick="addTier()">+ Tier</button>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="exportImg()">Export PNG</button>
    <button onclick="generateLink()">Share</button>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>
let dragged=null;

// INIT
function init() {
    const urlData = new URLSearchParams(location.search).get("data");
    if (urlData) {
        load(JSON.parse(atob(urlData)));
        return;
    }

    const saved = JSON.parse(localStorage.getItem("tierlist"));
    if (saved) load(saved);
    else ["S","A","B","C","D"].forEach(n=>createTier(n));
}

// CREATE TIER
function createTier(name, items=[]) {
    const tier=document.createElement("div");
    tier.className="tier";

    const label=document.createElement("div");
    label.className="label";

    const input=document.createElement("input");
    input.value=name;
    input.onchange=save;

    label.appendChild(input);

    const itemsDiv=createDropZone("items");

    tier.appendChild(label);
    tier.appendChild(itemsDiv);

    document.getElementById("tiers").appendChild(tier);

    items.forEach(src=>itemsDiv.appendChild(createItem(src)));
}

// DROP ZONE
function createDropZone(cls) {
    const div=document.createElement("div");
    div.className=cls;

    div.addEventListener("dragover",e=>{
        e.preventDefault();
        div.appendChild(dragged);
    });

    div.addEventListener("drop",save);

    return div;
}

// ITEM
function createItem(src) {
    const div=document.createElement("div");
    div.className="item";
    div.draggable=true;

    const img=document.createElement("img");
    img.src=src;

    div.appendChild(img);

    div.addEventListener("dragstart",()=>dragged=div);
    div.addEventListener("dragend",save);

    return div;
}

// UPLOAD
upload.onchange=e=>{
    const file=e.target.files[0];
    if(!file) return;

    const r=new FileReader();
    r.onload=()=>{
        pool.appendChild(createItem(r.result));
        save();
    };
    r.readAsDataURL(file);
};

// SAVE / LOAD
function save() {
    const data=[];

    document.querySelectorAll(".tier").forEach(t=>{
        data.push({
            name:t.querySelector("input").value,
            items:[...t.querySelectorAll("img")].map(i=>i.src)
        });
    });

    const poolItems=[...document.querySelectorAll("#pool img")].map(i=>i.src);

    localStorage.setItem("tierlist", JSON.stringify({tiers:data,pool:poolItems}));
}

function load(data) {
    document.getElementById("tiers").innerHTML="";
    pool.innerHTML="";

    data.tiers.forEach(t=>createTier(t.name,t.items));
    data.pool.forEach(src=>pool.appendChild(createItem(src)));
}

// ADD TIER
function addTier() {
    createTier("NEW");
    save();
}

// THEME
function toggleTheme() {
    document.body.classList.toggle("light");
}

// EXPORT PNG
function exportImg() {
    html2canvas(document.body).then(canvas=>{
        const link=document.createElement("a");
        link.download="tierlist.png";
        link.href=canvas.toDataURL();
        link.click();
    });
}

// SHARE LINK
function generateLink() {
    const data=localStorage.getItem("tierlist");
    const encoded=btoa(data);
    const url=location.origin+location.pathname+"?data="+encoded;

    navigator.clipboard.writeText(url);
    alert("Link zkopírován!");
}

// INIT CALL
const pool=createDropZone("pool");
document.getElementById("pool").replaceWith(pool);

init();
</script>

</body>
</html>
